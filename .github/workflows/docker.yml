name: Docker Install Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.2) — used for image tags'
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bsn4/grpc-php-rs

jobs:
  build-image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        ts: ['nts', 'zts']
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version and PHP image
        id: meta
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${{ matrix.ts }}" == "zts" ]]; then
            echo "php_image=php:${{ matrix.php }}-zts" >> "$GITHUB_OUTPUT"
            echo "ts_suffix=-zts" >> "$GITHUB_OUTPUT"
          else
            echo "php_image=php:${{ matrix.php }}-cli" >> "$GITHUB_OUTPUT"
            echo "ts_suffix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PHP_IMAGE=${{ steps.meta.outputs.php_image }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}-php${{ matrix.php }}${{ steps.meta.outputs.ts_suffix }}
            ${{ env.IMAGE }}:latest-php${{ matrix.php }}${{ steps.meta.outputs.ts_suffix }}
          cache-from: type=gha,scope=php${{ matrix.php }}-${{ matrix.ts }}
          cache-to: type=gha,mode=max,scope=php${{ matrix.php }}-${{ matrix.ts }}
